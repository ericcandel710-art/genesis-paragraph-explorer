<style>
body {
  font-family: Arial, sans-serif;
  max-width: 900px;
  margin: auto;
  padding: 20px;
  line-height: 1.5;
}
button {
  background-color: #4a6fa5;
  color: white;
  padding: 10px 16px;
  margin: 6px 0;
  border: none;
  width: 100%;
  text-align: left;
  font-size: 16px;
  cursor: pointer;
}
button:hover {
  background-color: #3b5a85;
}
.content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
  background: #f7f9fc;
  border-left: 3px solid #4a6fa5;
  padding: 0 16px;
  margin-bottom: 10px;
}
.content.open {
  padding: 10px 16px;
}
</style>

<script>
function toggle(id) {
  var box = document.getElementById(id);
  if (box.style.maxHeight) {
    box.style.maxHeight = null;
    box.classList.remove("open");
  } else {
    box.style.maxHeight = box.scrollHeight + "px";
    box.classList.add("open");
  }
}
</script>
</head>
